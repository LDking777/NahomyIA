version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nahomy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nahomy
      POSTGRES_PASSWORD: nahomy_secret
      POSTGRES_DB: nahomy_c2
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nahomy']
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: nahomy-queue
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmqctl', 'status']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: nahomy-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nahomy
      DB_PASSWORD: nahomy_secret
      DB_NAME: nahomy_c2
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: nahomy-c2-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  rabbitmqdata:
