apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nahomy-c2-api-hpa
  labels:
    app: nahomy-c2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nahomy-c2-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
