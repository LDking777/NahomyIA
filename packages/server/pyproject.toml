[project]
name = "nahomy-c2-backend"
version = "0.1.0"
description = "C2 IA Backend - Nahomy"
requires-python = ">=3.10"
dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "sqlalchemy[asyncio]==2.0.36",
    "asyncpg==0.30.0",
    "aio-pika==9.5.2",
    "pydantic==2.10.3",
    "passlib[bcrypt]==1.7.4",
    "bcrypt==4.2.1",
    "pyjwt==2.10.1",
    "python-dotenv==1.0.1",
    "alembic==1.14.0",
]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
include = ["src"]
